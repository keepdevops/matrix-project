<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Llama Matrix Swarm (CM6 Edition)</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: ui-sans-serif, system-ui; padding: 2rem; }
        #editor-wrapper { 
            border: 1px solid #334155; 
            border-radius: 0.5rem; 
            background: #1e293b;
            min-height: 300px;
            font-size: 14px;
        }
        .cm-editor { height: 100%; border-radius: 0.5rem; }
        .controls { margin-top: 1.5rem; display: flex; gap: 0.75rem; }
        button { 
            padding: 0.6rem 1.2rem; 
            cursor: pointer; 
            background: #3b82f6; 
            color: white; 
            border: none; 
            border-radius: 0.375rem;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover { background: #2563eb; }
        #status { margin-top: 1rem; color: #94a3b8; font-size: 0.9rem; }
        #output { 
            margin-top: 2rem; 
            padding: 1.5rem; 
            background: #020617; 
            border: 1px solid #1e293b; 
            border-radius: 0.5rem;
            font-family: ui-monospace, SFMono-Regular, monospace;
            line-height: 1.6;
            color: #38bdf8;
        }
    </style>
</head>
<body>
    <h1 style="margin-top:0">Matrix Swarm Control</h1>
    <div id="editor-wrapper"></div>
    
    <div class="controls">
        <button onclick="fire(8080)">Llama 8B (Heavy)</button>
        <button onclick="fire(8081)">Llama 3B (Logic)</button>
        <button onclick="fire(8082)">Phi 3.5 (Util)</button>
    </div>
    
    <div id="status">Node status: Standing by...</div>
    <div id="output">// Swarm response will appear here...</div>

    <script type="module">
        import { EditorView, basicSetup } from "https://esm.sh/codemirror?bundle";
        import { javascript } from "https://esm.sh/@codemirror/lang-javascript?bundle";
        import { oneDark } from "https://esm.sh/@codemirror/theme-one-dark?bundle";

        const view = new EditorView({
            doc: "// Type your system prompt or task here...\n",
            extensions: [basicSetup, javascript(), oneDark],
            parent: document.getElementById("editor-wrapper")
        });

        window.fire = async (port) => {
            const prompt = view.state.doc.toString();
            const out = document.getElementById("output");
            const status = document.getElementById("status");
            
            status.innerText = `Querying Node ${port}...`;
            out.innerText = "Processing...";

            try {
                const res = await fetch(`http://localhost:${port}/completion`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, n_predict: 256, stream: false })
                });
                const data = await res.json();
                out.innerText = data.content;
                status.innerText = `Node ${port} finished.`;
            } catch (e) {
                status.innerText = "Error: Check Docker/CORS";
                out.innerText = "Could not connect to the swarm node on port " + port;
            }
        };
    </script>
</body>
</html>
